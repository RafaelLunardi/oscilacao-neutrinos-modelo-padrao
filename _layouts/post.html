---
layout: default
---
<article>
  <header class="post-hero">
    <div class="wrap narrow">
      <p class="eyebrow">{{ page.categories | join: " / " }}</p>
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d/%m/%Y" }}</time>
        <span>{{ page.author | default: site.author.name }}</span>
      </div>
      {% if page.excerpt %}
      <p class="post-summary">{{ page.excerpt | strip_html }}</p>
      {% endif %}
    </div>
  </header>

  <section class="content-band">
    <div class="prose wrap narrow">
      {{ content }}
    </div>
  </section>
</article>
